<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoulinSoft</title>
<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b1e3a;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
}

.container{
max-width:1100px;
padding:40px;
text-align:center;
}

h1{
font-size:52px;
margin-bottom:10px;
animation:fadeDown 1s ease;
}

.tagline{
max-width:700px;
margin:auto;
font-size:18px;
opacity:0.9;
animation:fadeIn 2s ease;
}

.cards{
display:flex;
justify-content:center;
gap:25px;
margin-top:50px;
flex-wrap:wrap;
}

.card{
background:#5f8fd6;
padding:25px;
border-radius:16px;
transition:transform .25s, box-shadow .25s;
flex:1 1 250px;
max-width:300px;
}

.card:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

.card h2{
margin-top:0;
}

.footer{
margin-top:60px;
opacity:0.7;
font-size:14px;
text-align:center;
}

.contact-button{
margin-top:20px;
padding:10px 20px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:bold;
text-decoration:none;
display:inline-block;
}

.contact-button:hover{
background:#1e4fd1;
}

.toggle{
position:absolute;
right:25px;
top:25px;
background:#2563eb;
border:none;
padding:8px 14px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.toggle:hover{
background:#1e4fd1;
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-40px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}
</style>
</head>
<body>

<button class="toggle" onclick="toggleLang()" id="langBtn">FR</button>

<div class="container">
<h1>PoulinSoft</h1>
<p class="tagline" id="tagline"></p>

<div class="cards">
<div class="card">
<h2 id="gtitle"></h2>
<p id="gdesc"></p>
</div>

<div class="card">
<h2 id="utitle"></h2>
<p id="udesc"></p>
</div>

<div class="card">
<h2 id="ititle"></h2>
<p id="idesc"></p>
</div>
</div>

<p style="margin-top:40px" id="coming"></p>

<div class="footer" id="footer"></div>
<p style="opacity:0.7;font-size:14px;margin-top:10px;" id="designedText">Designed with intelligence</p>
<a class="contact-button" href="mailto:contact@poulinsoft.com" id="contactBtn">Contact</a>
</div>

<script>
// Personal project disclaimer to reassure employers
console.log("This website is a personal project, created for learning and portfolio purposes only. Not related to any employer.");

let lang="en";

const text={
 en:{
 tagline:"Building smart software for the future. Mobile games, powerful utilities, and innovative digital experiences crafted with creativity and intelligence.",
 gtitle:"Mobile Gaming",
 gdesc:"Fun, addictive and beautifully designed mobile games for iOS and Android.",
 utitle:"Utility Software",
 udesc:"Practical tools designed to simplify everyday digital tasks.",
 ititle:"Innovation",
 idesc:"Exploring new ideas, intelligent systems, and creative software solutions.",
 coming:"Full website coming soon.",
 footer:"Quebec, Canada • Designed with intelligence",
 designed:"Designed with intelligence",
 btn:"FR",
 contact:"Contact"
 },
 fr:{
 tagline:"Créer des logiciels intelligents pour l'avenir. Jeux mobiles, utilitaires puissants et expériences numériques innovantes.",
 gtitle:"Jeux mobiles",
 gdesc:"Jeux amusants, addictifs et bien conçus pour iOS et Android.",
 utitle:"Logiciels utilitaires",
 udesc:"Des outils pratiques pour simplifier les tâches numériques quotidiennes.",
 ititle:"Innovation",
 idesc:"Exploration de nouvelles idées et de solutions logicielles intelligentes.",
 coming:"Le site complet arrive bientôt.",
 footer:"Québec, Canada • Conçu avec intelligence",
 designed:"Conçu avec intelligence",
 btn:"EN",
 contact:"Contact"
 }
};

function apply(){
const t=text[lang];

document.getElementById("tagline").innerText=t.tagline;
document.getElementById("gtitle").innerText=t.gtitle;
document.getElementById("gdesc").innerText=t.gdesc;
document.getElementById("utitle").innerText=t.utitle;
document.getElementById("udesc").innerText=t.udesc;
document.getElementById("ititle").innerText=t.ititle;
document.getElementById("idesc").innerText=t.idesc;
document.getElementById("coming").innerText=t.coming;
document.getElementById("footer").innerText=t.footer;
document.getElementById("designedText").innerText=t.designed;
document.getElementById("langBtn").innerText=t.btn;
document.getElementById("contactBtn").innerText=t.contact;
}

function toggleLang(){
lang = lang === "en" ? "fr" : "en";
apply();
}

apply();
</script>

</body>
</html>
